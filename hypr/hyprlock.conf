# =============================================================================
# Hyprlock Yapılandırma Dosyası - 10/10 Mükemmel Kilit Ekranı
# AMD RX 6700 XT + Catppuccin Mocha Teması
# Yazar: MiniMax Agent
# Tarih: 2026-04-04
# =============================================================================

# =============================================================================
# GENEL AYARLAR
# =============================================================================

general {
    # Grace süresi: kilitleme sonrası ilk N saniye şifre sorulmaz.
    # 0 = Her zaman şifre gerekli (önerilen).
    grace = 0

    # Yükleme çubuğunu gizle
    disable_loading_bar = false

    # NOT (KALDIRILDI):
    #   grace_timeout    — geçersiz seçenek; hyprlock tanımıyor.
    #   idle_timeout     — hypridle'ın görevidir, hyprlock tanımıyor.
    #   lock_cmd_timeout — geçersiz seçenek; hyprlock tanımıyor.
    #   background_blur  — geçersiz seçenek; blur background{} bloğunda yapılandırılır.
    #   vrr              — hyprlock general bloğunda geçersiz.
}

# =============================================================================
# ARKA PLAN
# =============================================================================

background {
    path = /home/localhost/Pictures/lockscreen.jpg

    # Blur: blur_passes = uygulama sayısı, blur_size = yarıçap (piksel)
    # NOT (KALDIRILDI): blur_pixels ve blur_zones geçersiz seçeneklerdi.
    blur_passes = 3
    blur_size   = 10

    noise      = 0.0117
    brightness = 0.5
    vibrancy   = 0.2

    # NOT (KALDIRILDI): zpriority — geçersiz seçenek; hyprlock background bloğu tanımıyor.
}

# NOT: layer_effect bloğu KALDIRILDI.
# layer_effect hyprlock'un desteklediği bir blok türü değildir.
# Bu yapılandırma hyprlock başlangıcını engelliyordu.

# =============================================================================
# PAROLA ALANI
# =============================================================================

label {
    # Konum
    monitor =

    # FIX [LAYOUT]: Eski değer 0,65 — tüm elemanlar 25-72px aralığında
    # yığılıyordu. valign=center: positive y = yukarı, negative y = aşağı.
    # Yeni düzen: şifre etiketi input-field (0,-120) hemen üstünde.
    position = 0, -65

    size = 250, 50
    halign = center
    valign = center

    text = 

    font_family = JetBrainsMono Nerd Font
    font_size = 15
    color = rgba(203, 166, 247, 1.0)
    shadow_passes = 0
}

# =============================================================================
# ŞİFRE GİRİŞ ALANI
# =============================================================================

input-field {
    # Konum
    monitor =

    # Pozisyon
    # FIX [LAYOUT]: 0,72 → 0,-120 (şifre etiketinin altı, merkezden 120px aşağı)
    position = 0, -120

    # Boyut
    size = 300, 50

    # Hizalama
    halign = center
    valign = center

    # Placeholder metin
    placeholder_text =  Şifre...

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20

    # Şifre karakteri (gizli karakter)
    dots_size = 0.55
    dots_spacing = 0.15
    check_symbol = 

    # Placeholder rengi
    placeholder_color = rgba(166, 173, 200, 0.6)

    # Aktif şifre rengi (yazarken)
    font_color = rgba(205, 214, 244, 1.0)

    # Düzeltildi: on_input_ok_color → check_color, on_input_fail_color → fail_color
    check_color = rgba(166, 227, 161, 1.0)
    fail_color  = rgba(243, 139, 168, 1.0)

    # Düzeltildi: "300ms" string → 300 integer (ms cinsinden, suffix hatalıydı)
    fail_transition = 300

    # KALDIRILDI: accessible ve show_password — hyprlock tanımıyor.
    # Nokta göstergesi: dots_size/dots_spacing ile kontrol edilir.
    # Gizleme: hide_input = false (aşağıda)
    hide_input = false

    # Yuvarlak köşeler
    rounding = 10

    # Düzeltildi: border_size → outline_thickness, border_color → outer_color
    # inner_border_* geçersizdi → inner_color ile değiştirildi
    outline_thickness = 2
    outer_color       = rgba(166, 173, 200, 0.2)
    inner_color       = rgba(30, 30, 46, 0.8)

    # Gölge
    shadow_passes = 0

    # Ust üstte çizgi
    # overline = true
    # overline_color = rgba(166, 173, 200, 0.2)
}

# =============================================================================
# SAAT
# =============================================================================

label {
    monitor =

    # FIX [LAYOUT]: 0,35 → 0,150. Eski değerde saat diğer elemanlarla
    # çakışıyordu (80px font ~100px yükseklik). 150px yukarı taşındı.
    position = 0, 150

    size = 500, 100
    halign = center
    valign = center

    # Saat formatı
    # {H:M} = 24 saat
    # {h:M} = 12 saat
    # {AM/PM} = Öğleden önce/sonra
    text =   {H:M}

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 80
    font_color = rgba(205, 214, 244, 1.0)

    # Yazı tipi ağırlığı
    # font_weight = 700

    # Gölge
    shadow_passes = 0

    # NOT (KALDIRILDI): overline ve overline_color label bloğunda geçersizdir.
}

# =============================================================================
# TARİH
# =============================================================================

label {
    monitor =

    # FIX [LAYOUT]: 0,48 → 0,60. Saat (0,150) altında, kullanıcı adı (0,10)
    # üstünde konumlandırıldı.
    position = 0, 60

    size = 500, 50
    halign = center
    valign = center

    # Düzeltildi: {d} {m} {yyyy} geçersiz hyprlock değişkenleriydi.
    text = cmd[update:60000, date +"%d %B %Y"]

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20
    font_color = rgba(166, 173, 200, 0.8)

    # Gölge
    shadow_passes = 0
}

# =============================================================================
# KULLANICI ADI
# =============================================================================

label {
    monitor =

    # FIX [LAYOUT]: 0,25 → 0,10. Tarih (0,60) ile şifre etiketi (0,-65)
    # arasında merkeze yakın konumlandırıldı.
    position = 0, 10

    size = 500, 50
    halign = center
    valign = center

    # Kullanıcı adı
    # {user} = Mevcut kullanıcı adı
    text =   {user}

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 15
    font_color = rgba(166, 173, 200, 0.6)

    # Gölge
    shadow_passes = 0
}

# =============================================================================
# BİLDİRİM PANELİ
# =============================================================================

# NOT: Bildirim sayısı label'ı KALDIRILDI.
# {notifications} hyprlock'un desteklediği bir değişken değildir.
# padding seçeneği de label bloğunda geçersizdir.
# Bildirim sayısı için harici bir komut (dunstctl count) kullanılmalıdır.

# =============================================================================
# SİSTEM TRAY
# =============================================================================

# NOT: Pil label'ı KALDIRILDI.
# {battery_icon} ve {battery} hyprlock'un desteklediği değişkenler değildir.
# Masaüstü sistem (RX 6700 XT kurulumu) — pil sensörü bulunmamaktadır.

# =============================================================================
# SES KONTROLÜ
# =============================================================================

label {
    monitor =

    # Sol üst köşe — ses seviyesi
    position = 20, 20
    size     = 200, 50
    halign   = left
    valign   = top

    # Düzeltildi: {volume_icon} ve {volume} geçersiz değişkenlerdi.
    # pactl ile PipeWire/PulseAudio varsayılan sink ses seviyesi okunuyor.
    text = cmd[update:2000, echo " $(pactl get-sink-volume @DEFAULT_SINK@ | grep -oP '\d+(?=%)' | head -1)%"]

    font_family = JetBrainsMono Nerd Font
    font_size   = 15
    font_color  = rgba(249, 226, 175, 1.0)
    shadow_passes = 0
}

# =============================================================================
# WİFİ DURUMU
# =============================================================================

label {
    monitor =

    # Sağ üst köşe — ağ bağlantısı
    position = 20, 20
    size     = 200, 50
    halign   = right
    valign   = top

    # Düzeltildi: {wifi_icon} ve {wifi_strength} geçersiz değişkenlerdi.
    # nmcli ile aktif bağlantı adı veya IP adresi gösteriliyor.
    text = cmd[update:5000, nmcli -t -f NAME,TYPE,STATE con show --active 2>/dev/null | grep -v loopback | head -1 | cut -d: -f1 | xargs -I{} echo " {}" || echo " Bağlı Değil"]

    font_family = JetBrainsMono Nerd Font
    font_size   = 15
    font_color  = rgba(148, 226, 213, 1.0)
    shadow_passes = 0
}

# =============================================================================
# HIZLI EYLEMLER BUTONLARI
# =============================================================================

# Güç menüsü butonu
button {
    monitor =

    # Pozisyon (sağ alt)
    position = -100, -100

    # Boyut
    size = 50, 50

    # Hizalama
    halign = center
    valign = center

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20

    # İkon
    text = ⏻

    # Tıklandığında
    # wlogout = Güç menüsü
    # systemctl suspend = Uyku
    # systemctl reboot = Yeniden başlat
    # systemctl poweroff = Kapat
    on_click = wlogout

    # Renkler
    font_color = rgba(243, 139, 168, 1.0)
    # FIX: hover_color / pressed_color hyprlock button bloğunda GEÇERSIZ → kaldırıldı.

    # Arka plan
    rounding = 10
    outline_thickness = 2
    # FIX: border_color → outer_color (hyprlock button naming)
    outer_color = rgba(243, 139, 168, 0.3)
}

# Uyku butonu
button {
    monitor =

    # Pozisyon (sağ alt, güç yanında)
    position = -170, -100

    # Boyut
    size = 50, 50

    # Hizalama
    halign = center
    valign = center

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20

    # İkon
    text = 💤

    # Tıklandığında
    on_click = systemctl suspend

    # Renkler
    font_color = rgba(166, 173, 200, 1.0)
    # FIX: hover_color / pressed_color hyprlock button bloğunda GEÇERSIZ → kaldırıldı.

    # Arka plan
    rounding = 10
    outline_thickness = 2
    # FIX: border_color → outer_color (hyprlock button naming)
    outer_color = rgba(166, 173, 200, 0.3)
}

