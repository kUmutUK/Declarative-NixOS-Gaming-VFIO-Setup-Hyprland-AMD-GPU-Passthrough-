/////////////////////////////////////
// 🎯 CS:GO AUTOEXEC – Max Viewmodel & Min Bob
/////////////////////////////////////

// 🎯 Mouse
sensitivity "1.13"
zoom_sensitivity_ratio_mouse "0.5"
m_rawinput "1"
m_customaccel "0"

// 🎮 FPS & Performans (170 Hz için ideal)
fps_max "300"
mat_queue_mode "2"

// 🌐 Netcode (iyi internet – 128 tick)
rate "786432"
cl_cmdrate "128"
cl_updaterate "128"
cl_interp "0"
cl_interp_ratio "1"

// 🔫 Viewmodel (SINIRLARA OYNANMIŞ)
viewmodel_fov "68"
viewmodel_offset_x "2.5"      // Sağa en uzak (max)
viewmodel_offset_y "2"        // İleriye en uzak (max)
viewmodel_offset_z "-2"       // Aşağıya en uzak (min)

// 🔄 Bob (MİNİMUM SALLANTI)
cl_bob_lower_amt "5"
cl_bobamt_lat "0.1"
cl_bobamt_vert "0.1"
cl_bobcycle "0.1"             // En yavaş döngü

// 🎯 Crosshair (temiz, statik)
cl_crosshairstyle "4"
cl_crosshairsize "2.5"
cl_crosshairthickness "0.5"
cl_crosshairgap "-2"
cl_crosshair_drawoutline "0"

// 🔊 Ses (Pipewire düşük gecikme)
volume "0.5"
snd_mixahead "0.05"

// 🎮 Keybindler
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"
bind "space" "+jump"

bind "shift" "+sprint"
bind "ctrl" "+duck"

bind "mouse4" "slot7"
bind "mouse5" "slot8"

bind "q" "lastinv"

alias +dropc4 "slot5; +use"
alias -dropc4 "-use; drop"
bind "c" "+dropc4"

// 🗳️ Oylama (CS:GO için doğru komutlar)
bind "o" "vote option1"
bind "p" "vote option2"

// 🗺️ Radar
cl_radar_always_centered "0"
cl_radar_scale "0.4"
cl_hud_radar_scale "1.15"

// 🧼 Görsel temizlik
cl_autohelp "0"
gameinstructor_enable "0"

// 🎯 Recoil crosshair toggle
bind "t" "toggle cl_crosshair_recoil 0 1"

// 📌 KALICI AYARLAR İÇİN EN ALTTA
host_writeconfig
echo "CS:GO MAX VIEWMODEL CFG Yüklendi!"
